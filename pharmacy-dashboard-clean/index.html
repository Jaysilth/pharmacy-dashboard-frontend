    <!--
      SECURITY FIX: previously no CSP at all. This is a meta-tag CSP, which
      is a floor, not a ceiling — a header-based CSP set by your server/CDN
      (Render static site headers, or reverse proxy) is stronger because it
      can't be stripped by anything that manipulates the HTML.
      IMPORTANT: replace the placeholder in connect-src below with your real
      backend origin (e.g. https://your-api.onrender.com) or requests to the
      API will be blocked.
    --><meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://pharmacy-management-wamg.onrender.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" />
    
    <title>JotessEyeSpecialist Dashboard</title>
    <meta name="description" content="JotessEyeSpecialist — Pharmacy Management Dashboard" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="JotessEyeSpecialist Dashboard" />
    <meta property="og:description" content="JotessEyeSpecialist — Pharmacy Management Dashboard" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="JotessEyeSpecialist Dashboard" />
    <meta name="twitter:description" content="JotessEyeSpecialist — Pharmacy Management Dashboard" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
